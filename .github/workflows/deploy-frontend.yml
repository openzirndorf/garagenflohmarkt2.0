name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run lint

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /garagenflohmarkt2.0/
          VITE_API_URL: https://openzirndorfcouyb8pc-flohmarkt-api.functions.fnc.fr-par.scw.cloud
          VITE_API_USERNAME: ${{ secrets.VITE_API_USERNAME }}
          VITE_API_PASSWORD: ${{ secrets.VITE_API_PASSWORD }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
